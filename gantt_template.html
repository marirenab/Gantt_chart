<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gantt Planner Template</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#e9ecef;--surface:#f4f5f7;--surface2:#eceff3;--border:#cfd5dd;--text:#2f3743;--text2:#6b7280;--accent:#4ade80;--deliver:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
.app{display:flex;flex-direction:column;height:100vh}.toolbar{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}.toolbar h1{font-size:16px;font-weight:700;letter-spacing:-.5px;margin-right:auto}.toolbar h1 span{color:var(--accent)}.toolbar-hint{width:100%;font-size:11px;color:var(--text2)}.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:12px;cursor:pointer;transition:all .15s}.btn:hover{background:#dfe4ea}.btn.active{background:var(--accent);color:#102018;border-color:var(--accent)}.btn.deliver{background:var(--deliver);color:#fff;border-color:var(--deliver)}.btn:disabled{opacity:.45;cursor:default}.btn:disabled:hover{background:var(--surface2)}
.filters{display:flex;gap:6px;flex-wrap:wrap;padding:8px 20px;background:var(--surface);border-bottom:1px solid var(--border)}.filter-chip{padding:4px 10px;border-radius:12px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all .15s}.filter-chip.on{color:#fff;border-color:transparent}
.main{display:flex;flex:1;overflow:hidden}.sidebar{width:360px;min-width:360px;overflow-y:auto;border-right:1px solid var(--border);background:var(--surface)}.sidebar-row{display:flex;align-items:center;padding:0 12px;height:28px;border-bottom:1px solid var(--border);font-size:11px;cursor:pointer;transition:background .1s;gap:6px}.sidebar-row:hover{background:var(--surface2)}.sidebar-row .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}.sidebar-row .label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.sidebar-row .date{color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:10px;flex-shrink:0}.sidebar-row.delivery{background:rgba(255,51,51,.08)}.sidebar-row.delivery .label{font-weight:600}.sidebar-row.done .label{text-decoration:line-through;color:var(--text2)}.sidebar-row.done .dot{opacity:.45}.sidebar-row.conf-row{background:rgba(244,63,94,.06)}.sidebar-row.conf-row .label{font-style:italic}.row-check{width:16px;height:16px;border-radius:999px;border:1px solid var(--border);background:transparent;color:transparent;font-size:10px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}.row-check:hover{background:#dfe4ea}.row-check.done{background:var(--accent);border-color:var(--accent);color:#102018}
.chart-area{flex:1;overflow:auto;position:relative}.chart-header{position:sticky;top:0;z-index:10;display:flex;background:var(--surface);border-bottom:1px solid var(--border)}.month-col{text-align:center;font-size:10px;font-weight:600;color:var(--text2);padding:6px 0;border-right:1px solid var(--border);flex-shrink:0}.chart-body{position:relative}.chart-row{display:flex;align-items:center;height:28px;border-bottom:1px solid rgba(46,51,69,.4);position:relative}.bar{position:absolute;height:16px;border-radius:3px;top:6px;cursor:pointer;transition:opacity .15s;min-width:4px}.bar:hover{opacity:.85;filter:brightness(1.2)}.bar.delivery-bar{border:2px solid var(--deliver);box-shadow:0 0 6px rgba(255,51,51,.4)}.bar.done-bar{opacity:.4;filter:saturate(.6)}.today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--accent);z-index:5;opacity:.6}.today-label{position:absolute;top:2px;font-size:9px;color:var(--accent);font-weight:600;z-index:6;transform:translateX(-50%)}.conf-marker{position:absolute;height:28px;display:flex;align-items:center;justify-content:center;z-index:4}.conf-diamond{width:10px;height:10px;transform:rotate(45deg);border-radius:1px}
.tooltip{position:fixed;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:12px;z-index:100;pointer-events:none;max-width:300px;box-shadow:0 8px 24px rgba(70,78,92,.14)}.tooltip .tt-title{font-weight:600;margin-bottom:4px}.tooltip .tt-date{color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:11px}.tooltip .tt-proj{margin-top:4px;font-size:11px}.tooltip .tt-block{margin-top:6px;white-space:pre-wrap;word-break:break-word}
.modal-overlay{position:fixed;inset:0;background:rgba(120,130,145,.28);z-index:200;display:flex;align-items:center;justify-content:center}.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:420px;max-width:90vw;max-height:90vh;overflow:auto}.modal h2{font-size:16px;margin-bottom:16px}.modal label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;margin-top:12px}.modal p{font-size:12px;color:var(--text2);line-height:1.5}.modal input,.modal select,.modal textarea{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:13px}.modal textarea{min-height:88px;resize:vertical}.modal-buttons{display:flex;gap:8px;margin-top:20px;justify-content:flex-end;flex-wrap:wrap}.modal-buttons .btn{padding:8px 18px}.btn-danger{background:#dc2626;color:#fff;border-color:#dc2626}.btn-primary{background:var(--accent);color:#102018;border-color:var(--accent);font-weight:600}.project-list{display:flex;flex-direction:column;gap:10px;margin-top:10px}.project-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 12px;border-radius:8px;background:var(--surface2);border:1px solid var(--border)}.project-meta{display:flex;align-items:center;gap:10px;min-width:0}.project-text{display:flex;flex-direction:column;gap:2px;min-width:0}.project-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.project-count{font-size:11px;color:var(--text2)}
.legend{display:flex;gap:12px;flex-wrap:wrap;padding:8px 20px;background:var(--surface);border-top:1px solid var(--border)}.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2)}.legend-dot{width:10px;height:10px;border-radius:2px}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const DEFAULT_PROJECTS={'Project 1':{color:'#3b82f6',bg:'#1d4ed8'},'Project 2':{color:'#10b981',bg:'#047857'},'Project 3':{color:'#f59e0b',bg:'#d97706'},'Admin':{color:'#94a3b8',bg:'#64748b'},'Personal':{color:'#8b5cf6',bg:'#7c3aed'},'Milestones':{color:'#ef4444',bg:'#dc2626'}};
const PROJECT_PALETTE=[{color:'#10b981',bg:'#047857'},{color:'#f97316',bg:'#ea580c'},{color:'#3b82f6',bg:'#1d4ed8'},{color:'#ef4444',bg:'#dc2626'},{color:'#8b5cf6',bg:'#7c3aed'},{color:'#14b8a6',bg:'#0f766e'},{color:'#eab308',bg:'#ca8a04'},{color:'#ec4899',bg:'#db2777'}];
const STORAGE_KEYS={tasks:'ganttTemplateTasks',projects:'ganttTemplateProjects',undo:'ganttTemplateUndo'};
const CONF_DEADLINES=[];
let projects=loadProjects();
let tasks=[],showConf=true,filterProjects=new Set(Object.keys(projects)),editTask=null,showDeliveryOnly=false,undoHistory=loadUndoHistory();
const CSV_DATA=``;
const DAY_MS=86400000,DAY_W=18,ROW_H=28,UNDO_LIMIT=30;
const parseDate=s=>{const [y,m,d]=String(s).split('-').map(Number);return new Date(Date.UTC(y,m-1,d))};
const fmtDate=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const now=new Date();
const currentYear=now.getFullYear();
const startDate=parseDate(`${currentYear}-01-01`),endDate=parseDate(`${currentYear+2}-12-31`),totalDays=Math.ceil((endDate-startDate)/DAY_MS),today=parseDate(fmtDate(now));
const DEFAULT_TASKS=parseCsvData(CSV_DATA);
tasks=loadTasks();
sortTasks();
function parseCsvData(csv){if(!csv.trim())return[];return csv.trim().split('\n').map((line,i)=>{const p=line.split(',');return normalizeTask({id:i+1,date:p[0],startDate:p[0],endDate:p[0],task:p[1],project:p[2],delivery:p[3]==='DELIVER',description:'',outputs:''})})}
function loadDefaultProjects(){return JSON.parse(JSON.stringify(DEFAULT_PROJECTS))}
function safeRead(key,fallback){try{const raw=localStorage.getItem(key);return raw===null?fallback:JSON.parse(raw)}catch{return fallback}}
function safeWrite(key,value){try{localStorage.setItem(key,JSON.stringify(value))}catch{}}
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function jsq(v){return JSON.stringify(String(v??''))}
function escapeCsv(v){return `"${String(v??'').replace(/"/g,'""')}"`}
function loadUndoHistory(){const stored=safeRead(STORAGE_KEYS.undo,[]);return Array.isArray(stored)?stored:[]}
function saveUndoHistory(){safeWrite(STORAGE_KEYS.undo,undoHistory)}
function cloneState(state){return JSON.parse(JSON.stringify(state))}
function snapshotState(){return{projects:cloneState(projects),tasks:cloneState(tasks)}}
function pushUndoState(){undoHistory.push(snapshotState());if(undoHistory.length>UNDO_LIMIT)undoHistory.shift();saveUndoHistory()}
function loadProjects(){const stored=safeRead(STORAGE_KEYS.projects,null);return stored&&typeof stored==='object'&&!Array.isArray(stored)&&Object.keys(stored).length?stored:loadDefaultProjects()}
function nextProjectStyle(){const style=PROJECT_PALETTE[Object.keys(projects).length%PROJECT_PALETTE.length]||PROJECT_PALETTE[0];return{...style}}
function saveProjects(){safeWrite(STORAGE_KEYS.projects,projects)}
function ensureProject(name){if(!name||projects[name])return;projects[name]=DEFAULT_PROJECTS[name]?{...DEFAULT_PROJECTS[name]}:nextProjectStyle();filterProjects.add(name);saveProjects()}
function loadTasks(){const stored=safeRead(STORAGE_KEYS.tasks,null),source=Array.isArray(stored)?stored:DEFAULT_TASKS;return source.map((t,i)=>{const project=t.project||getProjectNames()[0]||'Project 1';ensureProject(project);return normalizeTask({...t,id:Number.isFinite(Number(t.id))?Number(t.id):i+1,project})})}
function sortTasks(){tasks.sort((a,b)=>getTaskStart(a).localeCompare(getTaskStart(b))||getTaskEnd(a).localeCompare(getTaskEnd(b))||a.task.localeCompare(b.task))}
function saveTasks(){sortTasks();safeWrite(STORAGE_KEYS.tasks,tasks)}
function nextTaskId(){return tasks.reduce((m,t)=>Math.max(m,Number(t.id)||0),0)+1}
function syncFilters(){filterProjects=new Set([...filterProjects].filter(name=>projects[name]));if(!filterProjects.size)filterProjects=new Set(Object.keys(projects))}
function getProjectNames(){return Object.keys(projects)}
function restoreState(state){projects=cloneState(state.projects||loadDefaultProjects());tasks=(Array.isArray(state.tasks)?state.tasks:[]).map((t,i)=>{const project=t.project||getProjectNames()[0]||'Project 1';ensureProject(project);return normalizeTask({...t,id:Number.isFinite(Number(t.id))?Number(t.id):i+1,project})});syncFilters();saveProjects();saveTasks()}
function normalizeTask(task){const startDateValue=task.startDate||task.date,endDateValue=task.endDate||task.startDate||task.date,safeEnd=parseDate(endDateValue)<parseDate(startDateValue)?startDateValue:endDateValue;return{id:Number(task.id),task:task.task||'',description:task.description||'',outputs:task.outputs||'',project:task.project||getProjectNames()[0]||'Project 1',delivery:Boolean(task.delivery),done:Boolean(task.done),date:startDateValue,startDate:startDateValue,endDate:safeEnd}}
function getTaskStart(task){return task.startDate||task.date}
function getTaskEnd(task){return task.endDate||task.startDate||task.date}
function taskDuration(task){return Math.max(1,Math.floor((parseDate(getTaskEnd(task))-parseDate(getTaskStart(task)))/DAY_MS)+1)}
function taskRangeLabel(task){const start=getTaskStart(task),end=getTaskEnd(task);return start===end?start.slice(5):`${start.slice(5)}→${end.slice(5)}`}
function taskFullRange(task){const start=getTaskStart(task),end=getTaskEnd(task);return start===end?start:`${start} to ${end}`}
function getMonths(){const months=[];let year=startDate.getUTCFullYear(),month=startDate.getUTCMonth();if(startDate.getUTCDate()!==1){month+=1;if(month===12){month=0;year+=1}}while(Date.UTC(year,month,1)<endDate.getTime()){const monthStart=new Date(Date.UTC(year,month,1)),nextStart=new Date(Date.UTC(year,month+1,1)),visibleStart=monthStart.getTime()<startDate.getTime()?startDate:monthStart,visibleEnd=nextStart.getTime()>endDate.getTime()?endDate:nextStart;months.push({label:monthStart.toLocaleDateString('en-US',{month:'short',year:'2-digit',timeZone:'UTC'}),days:Math.ceil((visibleEnd-visibleStart)/DAY_MS)});month+=1;if(month===12){month=0;year+=1}}return months}
function dayOffset(ds){return Math.floor((parseDate(ds)-startDate)/DAY_MS)}
function getFiltered(){let filtered=tasks.filter(t=>filterProjects.has(t.project));if(showDeliveryOnly)filtered=filtered.filter(t=>t.delivery);return filtered}
function visibleConf(){return showConf?CONF_DEADLINES.filter(c=>{const offset=dayOffset(c.date);return offset>=0&&offset<totalDays}):[]}
function modalShell(){let overlay=document.getElementById('modal-overlay');if(!overlay){overlay=document.createElement('div');overlay.id='modal-overlay';document.body.appendChild(overlay)}overlay.className='modal-overlay';overlay.onclick=e=>{if(e.target===overlay)closeModal()};return overlay}
function render(){const app=document.getElementById('app'),filtered=getFiltered(),months=getMonths(),chartWidth=totalDays*DAY_W,todayOff=Math.floor((today-startDate)/DAY_MS),conf=visibleConf(),totalRows=filtered.length+conf.length;app.innerHTML=`<div class="toolbar"><h1>Gantt <span>Template</span></h1><button class="btn ${showDeliveryOnly?'deliver':''}" onclick="toggleDelivery()">🚩 Deliveries only</button><button class="btn ${showConf?'active':''}" onclick="toggleConf()">📅 Conference deadlines</button><button class="btn" onclick="openAdd()">+ Add block</button><button class="btn" onclick="openProjects()">✳ Manage projects</button><button class="btn" onclick="undoLastChange()" ${undoHistory.length?'':'disabled'}>↶ Undo</button><button class="btn" onclick="exportCSV()">↓ Export CSV</button><button class="btn" onclick="exportDoneCSV()">↓ Export Done CSV</button><div class="toolbar-hint">Start with Manage projects, then add blocks. This template starts empty on purpose.</div></div><div class="filters">${Object.entries(projects).map(([name,project])=>`<button class="filter-chip ${filterProjects.has(name)?'on':''}" style="${filterProjects.has(name)?`background:${project.color}33;color:${project.color};border-color:${project.color}55`:''}" onclick='toggleFilter(${jsq(name)})'>${esc(name)}</button>`).join('')}</div><div class="main"><div class="sidebar">${filtered.map(task=>`<div class="sidebar-row ${task.delivery?'delivery':''} ${task.done?'done':''}" onclick="openEdit(${task.id})"><button class="row-check ${task.done?'done':''}" onclick="toggleDone(event,${task.id})" title="${task.done?'Mark as not done':'Mark as done'}">✓</button><div class="dot" style="background:${(projects[task.project]||{}).color||'#666'}"></div><div class="label">${task.delivery?'🚩 ':''}${esc(task.task)}</div><div class="date">${taskRangeLabel(task)}</div></div>`).join('')}${conf.map(item=>`<div class="sidebar-row conf-row"><div class="dot" style="background:${item.type==='deadline'?'#f43f5e':'#fbbf24'}"></div><div class="label">${item.type==='deadline'?'⏰':'🎪'} ${esc(item.name)}</div><div class="date">${item.date.slice(5)}</div></div>`).join('')}</div><div class="chart-area" id="chartArea"><div class="chart-header">${months.map(month=>`<div class="month-col" style="width:${month.days*DAY_W}px">${month.label}</div>`).join('')}</div><div class="chart-body" style="width:${chartWidth}px;height:${totalRows*ROW_H}px">${todayOff>=0&&todayOff<totalDays?`<div class="today-line" style="left:${todayOff*DAY_W}px"></div><div class="today-label" style="left:${todayOff*DAY_W}px">TODAY</div>`:''}${filtered.map(task=>{const offset=dayOffset(getTaskStart(task)),width=taskDuration(task)*DAY_W,project=projects[task.project]||{color:'#666',bg:'#444'};return`<div class="chart-row"><div class="bar ${task.delivery?'delivery-bar':''} ${task.done?'done-bar':''}" style="left:${offset*DAY_W}px;width:${width}px;background:linear-gradient(135deg,${project.color},${project.bg})" onmouseenter="showTip(event,${task.id})" onmouseleave="hideTip()" onclick="openEdit(${task.id})"></div></div>`}).join('')}${conf.map(item=>{const offset=dayOffset(item.date);return`<div class="chart-row"><div class="conf-marker" style="left:${offset*DAY_W-5}px"><div class="conf-diamond" style="background:${item.type==='deadline'?'#f43f5e':'#fbbf24'}"></div></div></div>`}).join('')}</div></div></div><div class="legend">${Object.entries(projects).filter(([name])=>filterProjects.has(name)).map(([name,project])=>`<div class="legend-item"><div class="legend-dot" style="background:${project.color}"></div>${esc(name)}</div>`).join('')}${showConf?`<div class="legend-item"><div class="legend-dot" style="background:#f43f5e"></div>⏰ Deadline</div><div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div>🎪 Conference</div>`:''}<div class="legend-item"><div class="legend-dot" style="background:#ff3333"></div>🚩 Delivery</div></div>`;const chartArea=document.getElementById('chartArea');if(chartArea&&todayOff>0)chartArea.scrollLeft=Math.max(0,todayOff*DAY_W-200)}
window.toggleConf=()=>{showConf=!showConf;render()};
window.toggleDelivery=()=>{showDeliveryOnly=!showDeliveryOnly;render()};
window.toggleFilter=name=>{filterProjects.has(name)?filterProjects.delete(name):filterProjects.add(name);render()};
window.showTip=(e,id)=>{const task=tasks.find(item=>item.id===id);if(!task)return;let tip=document.getElementById('tooltip');if(!tip){tip=document.createElement('div');tip.id='tooltip';tip.className='tooltip';document.body.appendChild(tip)}const project=projects[task.project]||{};tip.innerHTML=`<div class="tt-title">${task.delivery?'🚩 ':''}${esc(task.task)}</div><div class="tt-date">${taskFullRange(task)}${taskDuration(task)>1?` (${taskDuration(task)} days)`:''}</div><div class="tt-proj" style="color:${project.color||'#999'}">${esc(task.project)}</div><div class="tt-proj">${task.done?'Done':'To do'}</div>${task.description?`<div class="tt-block">${esc(task.description)}</div>`:''}${task.outputs?`<div class="tt-block"><strong>Outputs / paths</strong>\n${esc(task.outputs)}</div>`:''}`;tip.style.display='block';tip.style.left=Math.min(e.clientX+12,innerWidth-320)+'px';tip.style.top=e.clientY-60+'px'};
window.hideTip=()=>{const tip=document.getElementById('tooltip');if(tip)tip.style.display='none'};
window.toggleDone=(event,id)=>{event.stopPropagation();const task=tasks.find(item=>item.id===id);if(!task)return;pushUndoState();task.done=!task.done;saveTasks();render()};
window.undoLastChange=()=>{const previousState=undoHistory.pop();if(!previousState)return;restoreState(previousState);saveUndoHistory();closeModal();render()};
window.openEdit=id=>{editTask=tasks.find(task=>task.id===id);if(editTask)renderTaskModal()};
window.openAdd=()=>{const todayValue=fmtDate(new Date());editTask={id:-1,date:todayValue,startDate:todayValue,endDate:todayValue,task:'',description:'',outputs:'',project:getProjectNames()[0]||'Project 1',delivery:false,done:false};renderTaskModal()};
window.openProjects=()=>{renderProjectModal()};
function renderTaskModal(){const overlay=modalShell();overlay.innerHTML=`<div class="modal"><h2>${editTask.id===-1?'Add Block':'Edit Block'}</h2><label>Task</label><input id="m-task" value="${esc(editTask.task)}"><label>Description / details</label><textarea id="m-desc" placeholder="Add notes, links, context...">${esc(editTask.description||'')}</textarea><label>Outputs / paths</label><textarea id="m-out" placeholder="Figures: /path/here&#10;Ppt: /path/here">${esc(editTask.outputs||'')}</textarea><label>Start date</label><input id="m-start" type="date" value="${getTaskStart(editTask)}"><label>End date</label><input id="m-end" type="date" value="${getTaskEnd(editTask)}"><label>Project</label><select id="m-proj">${getProjectNames().map(name=>`<option value="${esc(name)}" ${name===editTask.project?'selected':''}>${esc(name)}</option>`).join('')}</select><label style="display:flex;align-items:center;gap:8px;margin-top:12px;color:var(--text)"><input type="checkbox" id="m-deliver" ${editTask.delivery?'checked':''}> 🚩 Delivery milestone</label><label style="display:flex;align-items:center;gap:8px;margin-top:12px;color:var(--text)"><input type="checkbox" id="m-done" ${editTask.done?'checked':''}> ✓ Mark as done</label><div class="modal-buttons">${editTask.id!==-1?'<button class="btn btn-danger" onclick="deleteTask()">Delete</button>':''}<button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveTask()">Save</button></div></div>`}
function renderProjectModal(){const overlay=modalShell();overlay.innerHTML=`<div class="modal"><h2>Manage Projects</h2><p>Project changes save automatically. Removing a project also removes any linked tasks.</p><div class="project-list">${getProjectNames().map(name=>{const count=tasks.filter(task=>task.project===name).length,project=projects[name]||{color:'#666'};return`<div class="project-row"><div class="project-meta"><div class="legend-dot" style="background:${project.color}"></div><div class="project-text"><div class="project-name">${esc(name)}</div><div class="project-count">${count} task${count===1?'':'s'}</div></div></div><button class="btn btn-danger" onclick='removeProject(${jsq(name)})'>Remove</button></div>`}).join('')}</div><label>New project name</label><input id="p-name" placeholder="e.g. Research, Operations, Sprint 1"><div class="modal-buttons"><button class="btn" onclick="closeModal()">Close</button><button class="btn btn-primary" onclick="addProject()">Add project</button></div></div>`}
window.saveTask=()=>{const task=document.getElementById('m-task').value.trim(),description=document.getElementById('m-desc').value.trim(),outputs=document.getElementById('m-out').value.trim(),startDateValue=document.getElementById('m-start').value,endDateValue=document.getElementById('m-end').value,project=document.getElementById('m-proj').value,delivery=document.getElementById('m-deliver').checked,done=document.getElementById('m-done').checked;if(!task||!startDateValue||!endDateValue||!project)return;ensureProject(project);const safeEnd=parseDate(endDateValue)<parseDate(startDateValue)?startDateValue:endDateValue;pushUndoState();if(editTask.id===-1)tasks.push(normalizeTask({id:nextTaskId(),startDate:startDateValue,endDate:safeEnd,date:startDateValue,task,description,outputs,project,delivery,done}));else{const current=tasks.find(item=>item.id===editTask.id);if(!current)return;Object.assign(current,normalizeTask({...current,startDate:startDateValue,endDate:safeEnd,date:startDateValue,task,description,outputs,project,delivery,done}))}saveTasks();closeModal();render()};
window.deleteTask=()=>{pushUndoState();tasks=tasks.filter(task=>task.id!==editTask.id);saveTasks();closeModal();render()};
window.addProject=()=>{const input=document.getElementById('p-name'),name=input.value.trim();if(!name||projects[name])return;pushUndoState();projects[name]=nextProjectStyle();filterProjects.add(name);saveProjects();closeModal();render()};
window.removeProject=name=>{if(!projects[name])return;if(getProjectNames().length===1){alert('Keep at least one project category.');return}const linked=tasks.filter(task=>task.project===name).length,message=linked?`Remove "${name}" and delete ${linked} linked task${linked===1?'':'s'}?`:`Remove "${name}"?`;if(!confirm(message))return;pushUndoState();tasks=tasks.filter(task=>task.project!==name);delete projects[name];filterProjects.delete(name);syncFilters();saveProjects();saveTasks();renderProjectModal();render()};
window.closeModal=()=>{const overlay=document.getElementById('modal-overlay');if(overlay)overlay.remove();editTask=null};
window.exportCSV=()=>{let csv='Start Date,End Date,Task,Description,Outputs,Project,Delivery,Status\n';tasks.forEach(task=>{csv+=`${escapeCsv(getTaskStart(task))},${escapeCsv(getTaskEnd(task))},${escapeCsv(task.task)},${escapeCsv(task.description)},${escapeCsv(task.outputs)},${escapeCsv(task.project)},${escapeCsv(task.delivery?'🚩 DELIVER':'')},${escapeCsv(task.done?'Done':'To do')}\n`});const blob=new Blob([csv],{type:'text/csv'}),link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download='gantt_template_export.csv';link.click()};
window.exportDoneCSV=()=>{const doneTasks=tasks.filter(task=>task.done);let csv='Start Date,End Date,Task,Description,Outputs,Project,Delivery,Status\n';doneTasks.forEach(task=>{csv+=`${escapeCsv(getTaskStart(task))},${escapeCsv(getTaskEnd(task))},${escapeCsv(task.task)},${escapeCsv(task.description)},${escapeCsv(task.outputs)},${escapeCsv(task.project)},${escapeCsv(task.delivery?'🚩 DELIVER':'')},${escapeCsv('Done')}\n`});const blob=new Blob([csv],{type:'text/csv'}),link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download='gantt_template_done_export.csv';link.click()};
render();
</script>
</body>
