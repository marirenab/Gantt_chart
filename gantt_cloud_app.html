<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Gantt Planner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#e9ecef;--surface:#f4f5f7;--surface2:#eceff3;--surface3:#e3e8ef;--border:#cfd5dd;--text:#2f3743;--text2:#6b7280;--accent:#4ade80;--accent2:#2563eb;--deliver:#ef4444;--warn:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
button,input,select,textarea{font:inherit}
.app{display:flex;flex-direction:column;height:100vh}
.center-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{width:min(560px,100%);background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px;box-shadow:0 20px 40px rgba(70,78,92,.12)}
.card h1{font-size:24px;letter-spacing:-.04em;margin-bottom:10px}
.card h1 span{color:var(--accent2)}
.card p,.muted{color:var(--text2);line-height:1.5}
.stack{display:flex;flex-direction:column;gap:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;transition:all .15s}
.btn:hover{background:#dfe4ea}
.btn-primary{background:var(--accent2);border-color:var(--accent2);color:#fff}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#102018;font-weight:600}
.btn-danger{background:#dc2626;border-color:#dc2626;color:#fff}
.btn-ghost{background:transparent}
.btn:disabled{opacity:.5;cursor:default}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text)}
.field textarea{min-height:92px;resize:vertical}
.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;font-size:11px;border:1px solid var(--border);background:var(--surface2);color:var(--text2)}
.flash{margin-top:14px;padding:10px 12px;border-radius:10px;background:#dbeafe;color:#1d4ed8;font-size:13px}
#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:10000;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 18px rgba(0,0,0,.18);pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap}
#toast.show{opacity:1}
#toast.ok{background:#d1fae5;color:#065f46}
#toast.err{background:#fee2e2;color:#991b1b}
.shell{display:grid;grid-template-columns:310px 1fr;height:100vh}
.nav{display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--surface)}
.nav-top{padding:18px 18px 12px;border-bottom:1px solid var(--border)}
.nav-top h1{font-size:20px;letter-spacing:-.04em}
.nav-top h1 span{color:var(--accent2)}
.nav-top p{font-size:12px;color:var(--text2);margin-top:4px}
.nav-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.nav-section{padding:12px 12px 0}
.nav-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;padding:0 6px 8px}
.chart-list{display:flex;flex-direction:column;gap:6px;padding:0 6px 14px;overflow:auto}
.chart-item{padding:12px;border:1px solid var(--border);border-radius:12px;background:transparent;cursor:pointer;transition:all .15s}
.chart-item:hover{background:var(--surface2)}
.chart-item.active{background:#dbeafe;border-color:#93c5fd}
.chart-item .title{font-size:14px;font-weight:600}
.chart-item .meta{font-size:11px;color:var(--text2);margin-top:6px;display:flex;gap:8px;flex-wrap:wrap}
.nav-bottom{margin-top:auto;padding:14px 18px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
.nav-bottom .email{font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis}
.workspace{display:flex;flex-direction:column;overflow:hidden;height:100vh}
#pdfExportRoot{display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden}
.workspace-empty{display:flex;align-items:center;justify-content:center;flex:1;padding:28px}
.empty-box{max-width:540px;padding:28px;border-radius:18px;border:1px dashed var(--border);background:rgba(255,255,255,.35)}
.toolbar{display:flex;align-items:center;gap:10px;padding:14px 18px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}
.toolbar h2{font-size:18px;letter-spacing:-.03em}
.toolbar-sub{width:100%;font-size:12px;color:var(--text2)}
.toolbar-gap{margin-right:auto}
.filters{display:flex;gap:6px;flex-wrap:wrap;padding:8px 18px;background:var(--surface);border-bottom:1px solid var(--border)}
.filter-chip{padding:4px 10px;border-radius:999px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all .15s}
.filter-chip.on{color:#fff;border-color:transparent}
.main{display:flex;flex:1;overflow:hidden;min-height:0}
.sidebar{width:360px;min-width:360px;overflow-y:auto;border-right:1px solid var(--border);background:var(--surface);min-height:0}
.sidebar-row{display:flex;align-items:center;padding:0 12px;height:30px;border-bottom:1px solid var(--border);font-size:11px;cursor:pointer;transition:background .1s;gap:6px}
.sidebar-row:hover{background:var(--surface2)}
.sidebar-row .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sidebar-row .label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar-row .date{color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:10px;flex-shrink:0}
.sidebar-row.delivery{background:rgba(255,51,51,.08)}
.sidebar-row.delivery .label{font-weight:600}
.sidebar-row.done .label{text-decoration:line-through;color:var(--text2)}
.sidebar-row.done .dot{opacity:.45}
.row-check{width:16px;height:16px;border-radius:999px;border:1px solid var(--border);background:transparent;color:transparent;font-size:10px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}
.row-check:hover{background:#dfe4ea}
.row-check.done{background:var(--accent);border-color:var(--accent);color:#102018}
.chart-area{flex:1;overflow:auto;position:relative;background:linear-gradient(180deg,rgba(255,255,255,.2),transparent);min-height:0}
.chart-header{position:sticky;top:0;z-index:10;display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.month-col{text-align:center;font-size:10px;font-weight:600;color:var(--text2);padding:6px 0;border-right:1px solid var(--border);flex-shrink:0}
.chart-body{position:relative}
.chart-row{display:flex;align-items:center;height:30px;border-bottom:1px solid rgba(46,51,69,.16);position:relative}
.bar{position:absolute;height:16px;border-radius:4px;top:7px;cursor:pointer;transition:opacity .15s;min-width:4px}
.bar:hover{opacity:.85;filter:brightness(1.1)}
.bar.delivery-bar{border:2px solid var(--deliver);box-shadow:0 0 6px rgba(255,51,51,.25)}
.bar.done-bar{opacity:.45;filter:saturate(.55)}
.today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--accent2);z-index:5;opacity:.5}
.today-label{position:absolute;top:2px;font-size:9px;color:var(--accent2);font-weight:700;z-index:6;transform:translateX(-50%)}
.tooltip{position:fixed;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:12px;z-index:100;pointer-events:none;max-width:320px;box-shadow:0 8px 24px rgba(70,78,92,.14)}
.tooltip .tt-title{font-weight:600;margin-bottom:4px}
.tooltip .tt-date{color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:11px}
.tooltip .tt-proj{margin-top:4px;font-size:11px}
.tooltip .tt-block{margin-top:6px;white-space:pre-wrap;word-break:break-word}
.legend{display:flex;gap:12px;flex-wrap:wrap;padding:8px 18px;background:var(--surface);border-top:1px solid var(--border)}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(120,130,145,.28);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:460px;max-width:100%;max-height:92vh;overflow:auto}
.modal h3{font-size:18px;letter-spacing:-.03em}
.modal p{font-size:12px;color:var(--text2);line-height:1.5;margin-top:8px}
.modal label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;margin-top:12px}
.modal input,.modal textarea,.modal select{width:100%;padding:9px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text)}
.modal textarea{min-height:88px;resize:vertical}
.modal-buttons{display:flex;gap:8px;margin-top:20px;justify-content:flex-end;flex-wrap:wrap}
.project-list,.share-list{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.project-row,.share-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 12px;border-radius:10px;background:var(--surface2);border:1px solid var(--border)}
.project-meta,.share-meta{display:flex;align-items:center;gap:10px;min-width:0}
.project-text,.share-text{display:flex;flex-direction:column;gap:2px;min-width:0}
.project-name,.share-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.project-count,.share-role{font-size:11px;color:var(--text2)}
@media (max-width:1100px){
  .shell{grid-template-columns:1fr}
  .nav{height:290px;border-right:none;border-bottom:1px solid var(--border)}
}
@media (max-width:820px){
  body{overflow:auto}
  .toolbar{padding:12px}
  .filters{padding:8px 12px}
  .main{flex-direction:column}
  .sidebar{width:100%;min-width:0;max-height:38vh;border-right:none;border-bottom:1px solid var(--border)}
}
.nav-top-main{flex:1;min-width:0}
.nav-collapsible{display:flex;flex-direction:column;flex:1;min-height:0;overflow:auto}
.nav-mobile-toggle{display:none}
@media (max-width:600px){
  .nav{height:auto;overflow:visible}
  .nav-top{display:flex;align-items:center;padding:12px 14px;gap:8px;flex-wrap:nowrap}
  .nav-top p,.nav-top .nav-actions{display:none}
  .nav-top h1{font-size:16px}
  .nav.mobile-open .nav-top p{display:block}
  .nav.mobile-open .nav-top .nav-actions{display:flex}
  .nav-mobile-toggle{display:flex;align-items:center;justify-content:center;padding:7px 12px;font-size:18px;line-height:1;flex-shrink:0;cursor:pointer}
  .nav-collapsible{display:none;max-height:55vh;overflow-y:auto}
  .nav.mobile-open .nav-collapsible{display:flex}
  .toolbar{overflow-x:auto;flex-wrap:nowrap;padding:8px 12px;gap:6px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .toolbar::-webkit-scrollbar{display:none}
  .toolbar h2{flex-shrink:0;font-size:15px;white-space:nowrap}
  .toolbar .pill,.toolbar .btn{flex-shrink:0;white-space:nowrap}
  .toolbar-gap{min-width:2px;flex-shrink:0}
  .toolbar-sub{padding:0 12px 8px!important;font-size:11px}
  .filters{overflow-x:auto;flex-wrap:nowrap;padding:6px 10px;gap:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .filter-chip{flex-shrink:0}
  .sidebar{max-height:30vh}
  .sidebar-row{height:40px}
  .modal-overlay{align-items:flex-end;padding:0}
  .modal{border-radius:20px 20px 0 0;width:100%;max-width:100%;max-height:88vh;padding:20px 16px 32px}
  .grid-2{grid-template-columns:1fr}
  #mascot{bottom:10px;right:12px}
  #mascot-face{width:44px;height:44px}
  #toast{max-width:90vw;white-space:normal;text-align:center}
}
#mascot{position:fixed;bottom:18px;right:22px;z-index:9999;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;user-select:none}
#mascot-bubble{background:#fff;border:1.5px solid var(--border);border-radius:14px 14px 4px 14px;padding:8px 13px;font-size:12px;color:var(--text);max-width:220px;line-height:1.4;box-shadow:0 4px 16px rgba(0,0,0,.1);opacity:0;transform:translateY(4px) scale(.95);transition:opacity .25s,transform .25s;pointer-events:none}
#mascot-bubble.show{opacity:1;transform:translateY(0) scale(1)}
#mascot-face{width:54px;height:54px;filter:drop-shadow(0 3px 8px rgba(0,0,0,.18));transition:transform .15s}
#mascot:hover #mascot-face{transform:scale(1.1) rotate(-5deg)}
@keyframes mascot-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
#mascot-face{animation:mascot-bounce 3s ease-in-out infinite}
#mascot:hover #mascot-face{animation:none}
.palette-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
.palette-swatch{border:2px solid var(--border);border-radius:12px;padding:10px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .15s;font-size:11px;color:var(--text2)}
.palette-swatch:hover{border-color:var(--accent2)}
.palette-swatch.active{border-color:var(--accent2);background:#dbeafe}
.palette-dots{display:flex;gap:4px}
.palette-dot{width:12px;height:12px;border-radius:50%}
.mascot-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
.mascot-opt{border:2px solid var(--border);border-radius:12px;padding:10px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;color:var(--text2);transition:all .15s}
.mascot-opt:hover{border-color:var(--accent2)}
.mascot-opt.active{border-color:var(--accent2);background:#dbeafe}
.mascot-opt .mascot-emoji{font-size:28px;line-height:1}
.subtask-row{display:flex;align-items:center;gap:5px;margin-top:5px}
.subtask-row input[type=text]{flex:1;min-width:0}
.subtask-row input[type=date]{width:130px;flex-shrink:0}
.subtask-row input[type=checkbox]{width:auto;flex-shrink:0;cursor:pointer;margin:0}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<div id="mascot" onclick="mascotSpeak()" title="Click me!">
  <div id="mascot-bubble"></div>
  <svg id="mascot-face" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
    <circle cx="11" cy="11" r="11" fill="#1a1a1a"/>
    <circle cx="49" cy="11" r="11" fill="#1a1a1a"/>
    <circle cx="11" cy="11" r="6" fill="#333"/>
    <circle cx="49" cy="11" r="6" fill="#333"/>
    <circle cx="30" cy="32" r="25" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
    <ellipse cx="20" cy="29" rx="9" ry="8" fill="#1a1a1a" transform="rotate(-8 20 29)"/>
    <ellipse cx="40" cy="29" rx="9" ry="8" fill="#1a1a1a" transform="rotate(8 40 29)"/>
    <circle cx="20" cy="30" r="4.5" fill="#fff"/>
    <circle cx="40" cy="30" r="4.5" fill="#fff"/>
    <circle cx="21" cy="30" r="2.5" fill="#111"/>
    <circle cx="41" cy="30" r="2.5" fill="#111"/>
    <circle cx="22" cy="28.5" r="1" fill="#fff"/>
    <circle cx="42" cy="28.5" r="1" fill="#fff"/>
    <ellipse cx="30" cy="38" rx="4" ry="3" fill="#444"/>
    <path d="M26 41 Q30 46 34 41" fill="none" stroke="#444" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="14" cy="41" r="6" fill="#ffb3c6" opacity="0.45"/>
    <circle cx="46" cy="41" r="6" fill="#ffb3c6" opacity="0.45"/>
  </svg>
</div>
<script type="module">
const STORAGE_KEYS={supabaseConfig:'cloudGanttSupabaseConfig',uiState:'cloudGanttUiState'};
const EMBEDDED_SUPABASE_CONFIG={
  url:'https://oembxcnvmqgtaczlydnn.supabase.co',
  key:'sb_publishable_r2RhVcuBgnOr_l7Bcqg24w_5cx40dwF'
};
const DEFAULT_PROJECTS=[
  {name:'Project 1',color:'#3b82f6',bg:'#1d4ed8'},
  {name:'Project 2',color:'#10b981',bg:'#047857'},
  {name:'Project 3',color:'#f59e0b',bg:'#d97706'},
  {name:'Admin',color:'#94a3b8',bg:'#64748b'},
  {name:'Personal',color:'#8b5cf6',bg:'#7c3aed'},
  {name:'Milestones',color:'#ef4444',bg:'#dc2626'}
];
const DAY_MS=86400000,DAY_W=18,ROW_H=30;
const esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const jsq=v=>JSON.stringify(String(v??''));
const parseDate=s=>{const [y,m,d]=String(s).split('-').map(Number);return new Date(Date.UTC(y,m-1,d))};
const fmtDate=d=>`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
const escapeCsv=v=>`"${String(v??'').replace(/"/g,'""')}"`;
const safeRead=(key,fallback)=>{try{const raw=localStorage.getItem(key);return raw===null?fallback:JSON.parse(raw)}catch{return fallback}};
const safeWrite=(key,value)=>{try{localStorage.setItem(key,JSON.stringify(value))}catch{}};
function loadSupabaseConfig(){
  const stored=safeRead(STORAGE_KEYS.supabaseConfig,null);
  return{
    url:stored?.url||EMBEDDED_SUPABASE_CONFIG.url,
    key:stored?.key||EMBEDDED_SUPABASE_CONFIG.key
  };
}
const cloneDefaultProjects=()=>Object.fromEntries(DEFAULT_PROJECTS.map((project,index)=>[project.name,{...project,position:index}]));
const app=document.getElementById('app');
let supabaseConfig=loadSupabaseConfig();
let supabase=null,session=null,user=null;
let charts=[],selectedChartId=null,selectedChart=null,selectedRole='owner';
let projects=cloneDefaultProjects(),tasks=[],filterProjects=new Set(Object.keys(projects));
let editTask=null,editSubtasks=[],showDeliveryOnly=false,shareRows=[],flashMessage='',loading=true,chartLoading=false,importFile=null,exportPdfPromise=null,chartLoadToken=0,resumeLoadPending=false;
const ST_OPEN='\n\n<!-- gantt-subtasks: ',ST_CLOSE=' -->';
function parseSubtasksFromDesc(raw){const idx=(raw||'').indexOf(ST_OPEN);if(idx===-1)return{text:raw||'',subtasks:[]};try{const end=raw.lastIndexOf(ST_CLOSE);return{text:raw.slice(0,idx),subtasks:JSON.parse(raw.slice(idx+ST_OPEN.length,end))};}catch{return{text:raw||'',subtasks:[]};}}
function encodeSubtasksInDesc(text,subtasks){const base=(text||'').trimEnd();if(!subtasks||!subtasks.length)return base;return base+ST_OPEN+JSON.stringify(subtasks)+ST_CLOSE;}

async function resumePlannerView(){
  if(resumeLoadPending||chartLoading||!supabase||!user)return;
  resumeLoadPending=true;
  try{
    const requestedChartId=requestedChartIdFromLocation();
    const savedChartId=readUiState().lastChartByUser?.[currentUserEmail()]||null;
    selectedChartId=requestedChartId||savedChartId||selectedChartId;
    await loadCharts(true,charts.length>0);
  }finally{
    resumeLoadPending=false;
  }
}

async function init(){
  if(!supabaseConfig.url||!supabaseConfig.key){loading=false;render();return}
  try{
    const {createClient}=await import('https://esm.sh/@supabase/supabase-js@2');
    supabase=createClient(supabaseConfig.url,supabaseConfig.key);
    const {data:{session:activeSession}}=await supabase.auth.getSession();
    session=activeSession;
    user=activeSession?.user||null;
    supabase.auth.onAuthStateChange(async(_event,nextSession)=>{
      session=nextSession;
      user=nextSession?.user||null;
      if(user)await loadCharts(true,charts.length>0);
      else resetChartState();
      render();
    });
    if(user)await loadCharts();
  }catch(error){
    flashMessage=`Could not connect to Supabase. ${error.message||error}`;
  }finally{
    loading=false;
    render();
  }
}

function resetChartState(){
  charts=[];
  selectedChartId=null;
  selectedChart=null;
  selectedRole='owner';
  projects=cloneDefaultProjects();
  tasks=[];
  shareRows=[];
  showDeliveryOnly=false;
  filterProjects=new Set(Object.keys(projects));
  clearChartInLocation();
}

function normalizeProjects(rows){
  if(!rows||!rows.length)return cloneDefaultProjects();
  const next={};
  rows.slice().sort((a,b)=>(a.position??0)-(b.position??0)||a.name.localeCompare(b.name)).forEach((row,index)=>{
    next[row.name]={id:row.id,name:row.name,color:row.color,bg:row.bg,position:row.position??index};
  });
  return next;
}

function normalizeTask(task){
  const startDate=task.start_date||task.startDate||task.date;
  const endDate=task.end_date||task.endDate||startDate;
  const safeEnd=parseDate(endDate)<parseDate(startDate)?startDate:endDate;
  const parsed=parseSubtasksFromDesc(task.description||'');
  const subtasks=parsed.subtasks.length?parsed.subtasks:(task.subtasks||[]);
  return{
    id:task.id,
    task:task.task||'',
    description:parsed.text,
    outputs:task.outputs||'',
    project:task.project||Object.keys(projects)[0]||DEFAULT_PROJECTS[0].name,
    delivery:Boolean(task.delivery),
    done:Boolean(task.done),
    startDate,
    endDate:safeEnd,
    subtasks
  };
}

function currentUserEmail(){
  return String(user?.email||'').trim().toLowerCase();
}

function requestedChartIdFromLocation(){
  const raw=String(window.location.hash||'').replace(/^#/,'').trim();
  if(!raw)return null;
  if(raw.startsWith('chart='))return decodeURIComponent(raw.slice(6));
  return decodeURIComponent(raw);
}

function rememberChartInLocation(chartId=selectedChartId){
  if(!chartId)return;
  const nextHash=`chart=${encodeURIComponent(chartId)}`;
  if(String(window.location.hash||'').replace(/^#/,'')===nextHash)return;
  history.replaceState(null,'',`${window.location.pathname}${window.location.search}#${nextHash}`);
}

function clearChartInLocation(){

function normalizeHexColor(value,fallback='#3b82f6'){
  const hex=String(value||'').trim();
  return /^#[0-9a-fA-F]{6}$/.test(hex)?hex:fallback;
}

function darkenHexColor(hex,amount=0.18){
  const safe=normalizeHexColor(hex);
  const clamp=value=>Math.max(0,Math.min(255,Math.round(value)));
  const r=clamp(parseInt(safe.slice(1,3),16)*(1-amount));
  const g=clamp(parseInt(safe.slice(3,5),16)*(1-amount));
  const b=clamp(parseInt(safe.slice(5,7),16)*(1-amount));
  return `#${[r,g,b].map(value=>value.toString(16).padStart(2,'0')).join('')}`;
}

  if(!supabase||!user)return;

  charts=data||[];

  const hasRequested=requestedChartId&&charts.some(chart=>chart.id===requestedChartId);
  const hasSaved=savedChartId&&charts.some(chart=>chart.id===savedChartId);
  if(!preferCurrent||!hasCurrent)selectedChartId=hasRequested?requestedChartId:(hasSaved?savedChartId:(charts[0]?.id||null));

async function loadSelectedChart(chartId=selectedChartId){
  const loadToken=++chartLoadToken;
  selectedChartId=chartId||null;
  selectedChart=charts.find(chart=>chart.id===selectedChartId)||null;
  if(!selectedChart){
    projects=cloneDefaultProjects();
    tasks=[];
    shareRows=[];
    selectedRole='owner';
    showDeliveryOnly=false;
    filterProjects=new Set(Object.keys(projects));
    return;
  }
  const targetChartId=selectedChart.id;
  const isOwner=Boolean(selectedChart&&user&&selectedChart.owner_id===user.id);
  const accessPromise=isOwner
    ? Promise.resolve({data:[{email:currentUserEmail(),role:'owner'}],error:null})
    : supabase.from('chart_access').select('role').eq('chart_id',targetChartId).eq('email',currentUserEmail()).maybeSingle();
  const [projectsResult,tasksResult,accessResult,shareResult]=await Promise.all([
    supabase.from('projects').select('*').eq('chart_id',targetChartId).order('position'),
    supabase.from('tasks').select('*').eq('chart_id',targetChartId).order('start_date').order('end_date').order('task'),
    accessPromise,
    isOwner?supabase.from('chart_access').select('*').eq('chart_id',targetChartId).order('email'):Promise.resolve({data:[],error:null})
  ]);
  if(loadToken!==chartLoadToken||targetChartId!==selectedChartId)return;
  if(projectsResult.error||tasksResult.error||accessResult.error||shareResult.error){
    flashMessage=projectsResult.error?.message||tasksResult.error?.message||accessResult.error?.message||shareResult.error?.message||'Could not load chart';
    return;
  }
  projects=normalizeProjects(projectsResult.data);
  tasks=(tasksResult.data||[]).map(normalizeTask);
  selectedRole=isOwner?'owner':(accessResult.data?.role||'viewer');
  shareRows=isOwner?shareResult.data||[]:[];
  restoreChartView();
  syncFilters();
  rememberSelectedChart();
}

function dateWindow(){
  if(!tasks.length){
    const year=new Date().getUTCFullYear();
    const startDate=parseDate(`${year}-01-01`);
    const endDate=parseDate(`${year+1}-12-31`);
    return{startDate,endDate,totalDays:Math.floor((endDate-startDate)/DAY_MS)+1};
  }
  const starts=tasks.map(task=>getTaskStart(task)).sort();
  const ends=tasks.map(task=>getTaskEnd(task)).sort();
  const startYear=parseDate(starts[0]).getUTCFullYear();
  const endYear=parseDate(ends[ends.length-1]).getUTCFullYear();
  const startDate=parseDate(`${startYear}-01-01`);
  const endDate=parseDate(`${endYear}-12-31`);
  return{startDate,endDate,totalDays:Math.floor((endDate-startDate)/DAY_MS)+1};
}

function getMonths(startDate,endDate){
  const months=[];
  let year=startDate.getUTCFullYear(),month=startDate.getUTCMonth();
  while(Date.UTC(year,month,1)<=endDate.getTime()){
    const monthStart=new Date(Date.UTC(year,month,1));
    const nextStart=new Date(Date.UTC(year,month+1,1));
    const visibleStart=monthStart.getTime()<startDate.getTime()?startDate:monthStart;
    const visibleEnd=nextStart.getTime()>endDate.getTime()?new Date(endDate.getTime()+DAY_MS):nextStart;
    months.push({label:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][month]+' '+year,days:Math.ceil((visibleEnd-visibleStart)/DAY_MS)});
    month+=1;
    if(month===12){month=0;year+=1}
  }
  return months;
}

function dayOffset(ds,startDate){
  return Math.floor((parseDate(ds)-startDate)/DAY_MS);
}

function getTaskStart(task){return task.startDate}
function getTaskEnd(task){return task.endDate}
function taskDuration(task){return Math.max(1,Math.floor((parseDate(getTaskEnd(task))-parseDate(getTaskStart(task)))/DAY_MS)+1)}
function euD(iso){const p=iso.split('-');return p[2]+'/'+p[1]+'/'+p[0].slice(2);}
function euDate(iso){const p=iso.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function taskRangeLabel(task){const start=getTaskStart(task),end=getTaskEnd(task);return start===end?euD(start):`${euD(start)}→${euD(end)}`}
function taskFullRange(task){const start=getTaskStart(task),end=getTaskEnd(task);return start===end?euDate(start):`${euDate(start)} to ${euDate(end)}`}
function chartTitleForFile(){return(selectedChart?.title||'gantt_chart').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'')||'gantt_chart'}

function filteredTasks(){
  let filtered=tasks.filter(task=>filterProjects.has(task.project));
  if(showDeliveryOnly)filtered=filtered.filter(task=>task.delivery);
  filtered.sort((a,b)=>getTaskStart(a).localeCompare(getTaskStart(b))||getTaskEnd(a).localeCompare(getTaskEnd(b))||a.task.localeCompare(b.task));
  return filtered;
}

function parseCsv(text){
  const rows=[];
  let row=[],cell='',inQuotes=false;
  for(let i=0;i<text.length;i+=1){
    const char=text[i];
    if(inQuotes){
      if(char==='"'){
        if(text[i+1]==='"'){cell+='"';i+=1}
        else inQuotes=false;
      }else{
        cell+=char;
      }
    }else if(char==='"'){
      inQuotes=true;
    }else if(char===','){
      row.push(cell);
      cell='';
    }else if(char==='\n'){
      row.push(cell);
      rows.push(row);
      row=[];
      cell='';
    }else if(char!=='\r'){
      cell+=char;
    }
  }
  if(cell.length||row.length){
    row.push(cell);
    rows.push(row);
  }
  return rows.filter(columns=>columns.some(value=>String(value).trim()!==''));
}

function firstHeader(headers,options){
  const normalized=headers.map(header=>String(header||'').trim().toLowerCase());
  for(const option of options){
    const index=normalized.indexOf(option);
    if(index!==-1)return index;
  }
  return -1;
}

function parseImportRows(text){
  const rows=parseCsv(text);
  if(rows.length<2)throw new Error('The CSV looks empty.');
  const headers=rows[0];
  const startIndex=firstHeader(headers,['start date','start_date','date']);
  const endIndex=firstHeader(headers,['end date','end_date']);
  const taskIndex=firstHeader(headers,['task','title']);
  const descriptionIndex=firstHeader(headers,['description','details','notes']);
  const outputsIndex=firstHeader(headers,['outputs','output paths','output','outputs / paths']);
  const projectIndex=firstHeader(headers,['project','category']);
  const deliveryIndex=firstHeader(headers,['delivery','milestone']);
  const statusIndex=firstHeader(headers,['status','done']);
  if(startIndex===-1||taskIndex===-1||projectIndex===-1)throw new Error('CSV must include at least Start Date, Task, and Project columns.');
  return rows.slice(1).map((columns,index)=>{
    const startDate=String(columns[startIndex]||'').trim();
    const endDate=String(columns[endIndex]||columns[startIndex]||'').trim()||startDate;
    const task=String(columns[taskIndex]||'').trim();
    const project=String(columns[projectIndex]||'').trim();
    if(!startDate||!task||!project)return null;
    const description=descriptionIndex===-1?'':String(columns[descriptionIndex]||'').trim();
    const outputs=outputsIndex===-1?'':String(columns[outputsIndex]||'').trim();
    const deliveryRaw=deliveryIndex===-1?'':String(columns[deliveryIndex]||'').trim().toLowerCase();
    const statusRaw=statusIndex===-1?'':String(columns[statusIndex]||'').trim().toLowerCase();
    return normalizeTask({
      id:`import-${index}`,
      task,
      description,
      outputs,
      project,
      delivery:deliveryRaw.includes('deliver')||deliveryRaw.includes('true')||deliveryRaw.includes('yes')||deliveryRaw.includes('1')||deliveryRaw.includes('🚩'),
      done:statusRaw==='done'||statusRaw==='true'||statusRaw==='yes'||statusRaw==='1',
      startDate,
      endDate
    });
  }).filter(Boolean);
}

  }).select().single();

async function renameProject(oldName){
  if(!selectedChart||!selectedCanEdit()||!projects[oldName])return;
  const input=document.getElementById(projectControlId('rename-project',oldName));
  const newName=input?.value.trim();
  if(!newName||newName===oldName)return;
  if(projects[newName]){
    flashMessage=`A project called "${newName}" already exists.`;
    renderProjectsModal();
    render();
    return;
  }
  const linkedTasks=tasks.filter(task=>task.project===oldName);
  const project=projects[oldName];
  const insertProjectResult=await supabase.from('projects').insert({
    chart_id:selectedChart.id,
    name:newName,
    color:project.color,
    bg:project.bg,
    position:project.position??0
  });
  if(insertProjectResult.error){flashMessage=insertProjectResult.error.message;render();return}
  if(linkedTasks.length){
    const taskIds=linkedTasks.map(task=>task.id);
    const updateTasksResult=await supabase.from('tasks').update({project:newName}).in('id',taskIds);
    if(updateTasksResult.error){flashMessage=updateTasksResult.error.message;render();return}
  }
  const deleteProjectResult=await supabase.from('projects').delete().eq('chart_id',selectedChart.id).eq('name',oldName);
  if(deleteProjectResult.error){flashMessage=deleteProjectResult.error.message;render();return}
  showToast(`Renamed "${oldName}" → "${newName}" ✓`);
  await loadSelectedChart();
  renderProjectsModal();
  render();
}

async function saveTask(){
  if(!selectedChart||!selectedCanEdit())return;
  const taskValue=document.getElementById('m-task').value.trim();
  const description=document.getElementById('m-desc').value.trim();
  const outputs=document.getElementById('m-out').value.trim();
  const startDate=document.getElementById('m-start').value;
  const endDateInput=document.getElementById('m-end').value;
  const project=document.getElementById('m-proj').value;
  const delivery=document.getElementById('m-deliver').checked;
  const done=document.getElementById('m-done').checked;
  if(!taskValue||!startDate||!endDateInput||!project)return;
  const safeEnd=parseDate(endDateInput)<parseDate(startDate)?startDate:endDateInput;
  const subtasks=collectSubtasks();
  const encodedDescription=encodeSubtasksInDesc(description,subtasks);
  const payload={chart_id:selectedChart.id,task:taskValue,description:encodedDescription,outputs,project,start_date:startDate,end_date:safeEnd,delivery,done};
  const btn=document.querySelector('#modal-overlay .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  try{
    const request=editTask.id==='new'
      ? supabase.from('tasks').insert(payload)
      : supabase.from('tasks').update(payload).eq('id',editTask.id);
    const {error}=await request;
    if(error)throw new Error(error.message);
    if(editTask.id!=='new'){
      const idx=tasks.findIndex(t=>t.id===editTask.id);
      if(idx!==-1)tasks.splice(idx,1,normalizeTask({...editTask,...payload,start_date:startDate,end_date:safeEnd}));
    }
    closeModal();
    showToast('Block saved ✓');
    render();
    loadSelectedChart();
  }catch(err){
    showToast(`Save failed: ${err.message}`,'err');
    flashMessage=`Save failed: ${err.message}`;
    if(btn){btn.disabled=false;btn.textContent='Save';}
    render();
  }
}

function buildGanttCanvas(){
  const filtered=filteredTasks();
  if(!filtered.length)throw new Error('No tasks to export. Add some blocks first.');
  const {startDate,endDate,totalDays}=dateWindow();
  const months=getMonths(startDate,endDate);
  const SB=340,DW=DAY_W,RH=ROW_H,TH=44,MH=28,LH=36;
  const CW=totalDays*DW,W=SB+CW,H=TH+MH+filtered.length*RH+LH;
  const S=Math.max(1,Math.min(2,Math.floor(8000/Math.max(W,H))));
  const cv=document.createElement('canvas');
  cv.width=W*S;cv.height=H*S;
  const ctx=cv.getContext('2d');
  ctx.scale(S,S);
  const bg='#e9ecef',surf='#f4f5f7',bdr='#cfd5dd',tx='#2f3743',tx2='#6b7280',acc='#2563eb';
  const rr=(x,y,w,h,r)=>{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();};
  const hl=(y,c=bdr,w=1)=>{ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.strokeStyle=c;ctx.lineWidth=w;ctx.stroke();};
  const vl=(x,y1,y2,c=bdr,w=1)=>{ctx.beginPath();ctx.moveTo(x,y1);ctx.lineTo(x,y2);ctx.strokeStyle=c;ctx.lineWidth=w;ctx.stroke();};
  const trunc=(t,mw)=>{if(ctx.measureText(t).width<=mw)return t;while(t.length>1&&ctx.measureText(t+'…').width>mw)t=t.slice(0,-1);return t+'…';};
  // background
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // title bar
  ctx.fillStyle=surf;ctx.fillRect(0,0,W,TH);hl(TH);
  ctx.font='600 15px "DM Sans",sans-serif';ctx.fillStyle=tx;ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText(selectedChart.title||'Gantt Chart',18,TH/2);
  ctx.font='400 10px "DM Sans",sans-serif';ctx.fillStyle=tx2;ctx.textAlign='right';
  ctx.fillText('Exported '+fmtDate(new Date()),W-18,TH/2);
  // sidebar + month headers background
  ctx.fillStyle=surf;ctx.fillRect(0,TH,SB,MH);ctx.fillRect(SB,TH,CW,MH);
  ctx.font='600 10px "DM Sans",sans-serif';ctx.fillStyle=tx2;ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('Task',28,TH+MH/2);ctx.textAlign='right';ctx.fillText('Dates',SB-8,TH+MH/2);
  // month columns
  let mx=SB;
  for(const m of months){const mw=m.days*DW;vl(mx,TH,TH+MH);ctx.font='600 10px "DM Sans",sans-serif';ctx.fillStyle=tx2;ctx.textAlign='center';ctx.textBaseline='middle';if(mw>20)ctx.fillText(m.label,mx+mw/2,TH+MH/2);mx+=mw;}
  hl(TH+MH);vl(SB,TH,H-LH);
  // today line
  const today=parseDate(fmtDate(new Date()));
  const todayOff=Math.floor((today-startDate)/DAY_MS);
  if(todayOff>=0&&todayOff<totalDays){const tx2x=SB+todayOff*DW;vl(tx2x,TH+MH,TH+MH+filtered.length*RH,acc+'80',2);ctx.font='bold 8px "DM Sans",sans-serif';ctx.fillStyle=acc;ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('TODAY',tx2x,TH+MH+2);}
  // rows
  ctx.textBaseline='middle';
  for(let i=0;i<filtered.length;i++){
    const task=filtered[i];const ry=TH+MH+i*RH;const proj=projects[task.project]||{color:'#666',bg:'#444'};
    if(task.delivery){ctx.fillStyle='rgba(255,51,51,0.07)';ctx.fillRect(0,ry,SB,RH);}
    hl(ry+RH,'rgba(46,51,69,0.12)',0.5);
    // dot
    ctx.fillStyle=task.done?proj.color+'80':proj.color;ctx.beginPath();ctx.arc(16,ry+RH/2,4,0,Math.PI*2);ctx.fill();
    // label
    ctx.font=(task.delivery?'600':'400')+' 11px "DM Sans",sans-serif';ctx.fillStyle=task.done?tx2:tx;ctx.textAlign='left';
    const lbl=(task.delivery?'🚩 ':'')+task.task;const tlbl=trunc(lbl,SB-100);
    ctx.fillText(tlbl,28,ry+RH/2);
    if(task.done){ctx.strokeStyle=tx2;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(28,ry+RH/2);ctx.lineTo(28+ctx.measureText(tlbl).width,ry+RH/2);ctx.stroke();}
    // date
    ctx.font='10px "JetBrains Mono",monospace';ctx.fillStyle=tx2;ctx.textAlign='right';ctx.fillText(taskRangeLabel(task),SB-8,ry+RH/2);
    // bar
    const off=dayOffset(getTaskStart(task),startDate);const dur=Math.max(1,taskDuration(task));
    const bx=SB+off*DW,bw=Math.max(4,dur*DW),by=ry+(RH-16)/2;
    rr(bx,by,bw,16,4);
    if(task.done){ctx.fillStyle=proj.color+'55';ctx.fill();}
    else{const g=ctx.createLinearGradient(bx,0,bx+bw,0);g.addColorStop(0,proj.color);g.addColorStop(1,proj.bg);ctx.fillStyle=g;ctx.fill();}
    if(task.delivery&&!task.done){rr(bx,by,bw,16,4);ctx.strokeStyle='#ef4444';ctx.lineWidth=2;ctx.stroke();}
  }
  // legend
  const ly=TH+MH+filtered.length*RH;ctx.fillStyle=surf;ctx.fillRect(0,ly,W,LH);hl(ly);
  let lx=18;ctx.textBaseline='middle';
  for(const [nm,proj] of Object.entries(projects)){if(!filterProjects.has(nm))continue;rr(lx,ly+LH/2-5,10,10,2);ctx.fillStyle=proj.color;ctx.fill();ctx.font='10px "DM Sans",sans-serif';ctx.fillStyle=tx2;ctx.textAlign='left';ctx.fillText(nm,lx+14,ly+LH/2);lx+=ctx.measureText(nm).width+28;}
  rr(lx,ly+LH/2-5,10,10,2);ctx.fillStyle='#ff3333';ctx.fill();ctx.fillText('🚩 Delivery',lx+14,ly+LH/2);
  return cv;
}

async function exportPdf(){
  if(!selectedChart)return;
  closeModal();
  try{
    flashMessage='Generating PDF…';render();
    await new Promise(r=>setTimeout(r,50));
    const canvas=buildGanttCanvas();
    const {jsPDF}=await loadPdfTools();
    const orientation=canvas.width>canvas.height?'landscape':'portrait';
    const pdf=new jsPDF({orientation,unit:'pt',format:'a4'});
    const pageW=pdf.internal.pageSize.getWidth(),pageH=pdf.internal.pageSize.getHeight();
    const margin=20,printW=pageW-margin*2,printH=pageH-margin*2;
    const scale=printW/canvas.width;
    const sliceH=Math.max(1,Math.floor(printH/scale));
    let y=0,page=0;
    while(y<canvas.height){
      const h=Math.min(sliceH,canvas.height-y);
      const sc=document.createElement('canvas');sc.width=canvas.width;sc.height=h;
      sc.getContext('2d').drawImage(canvas,0,y,canvas.width,h,0,0,canvas.width,h);
      if(page>0)pdf.addPage();
      pdf.addImage(sc.toDataURL('image/png'),'PNG',margin,margin,printW,h*scale);
      y+=h;page++;
    }
    pdf.save(`${chartTitleForFile()}.pdf`);
    flashMessage=`Saved ${selectedChart.title} as PDF.`;
  }catch(err){flashMessage=`Could not export PDF. ${err.message||err}`;}
  render();
}

function exportHtmlSnapshot(){

  const standaloneTitle=selectedChart.title;
  const standaloneProjects=Object.fromEntries(Object.entries(projects).map(([name,project])=>[name,{name,color:project.color,bg:project.bg,position:project.position??0}]));
  const standaloneTasks=tasks.map(task=>({
    id:task.id,
    task:task.task,
    description:encodeSubtasksInDesc(task.description,task.subtasks||[]),
    outputs:task.outputs,
    project:task.project,
    delivery:task.delivery,
    done:task.done,
    startDate:getTaskStart(task),
    endDate:getTaskEnd(task)
  }));
  const standalonePayload=JSON.stringify({title:standaloneTitle,projects:standaloneProjects,tasks:standaloneTasks}).replace(/</g,'\\u003c');
  const dataScript=`<script id="gantt-standalone-data" type="application/json">${standalonePayload}<\/script>`;
  const appCode = `(()=>{
const DATA=JSON.parse(document.getElementById('gantt-standalone-data')?.textContent||'{"title":"Gantt Chart","projects":{},"tasks":[]}');
const DAY_MS=86400000,DAY_W=18,ROW_H=30;
const esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

iddle';if(mw>20)ctx.fillText(m.label,mx+mw/2,TH+MH/2);mx+=mw;}hl(TH+MH);vl(SB,TH,H-LH);const today=parseDate(fmtDate(new Date()));const todayOff=Math.floor((today-startDate)/DAY_MS);if(todayOff>=0&&todayOff<totalDays){const ttx=SB+todayOff*DW;vl(ttx,TH+MH,TH+MH+filtered.length*RH,acc+'80',2);ctx.font='bold 8px "DM Sans",sans-serif';ctx.fillStyle=acc;ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('TODAY',ttx,TH+MH+2);}ctx.textBaseline='middle';for(let i=0;i<filtered.length;i++){const task=filtered[i];const ry=TH+MH+i*RH;const proj=projects[task.project]||{color:'#666',bg:'#444'};if(task.delivery){ctx.fillStyle='rgba(255,51,51,0.07)';ctx.fillRect(0,ry,SB,RH);}hl(ry+RH,'rgba(46,51,69,0.12)',0.5);ctx.fillStyle=task.done?proj.color+'80':proj.color;ctx.beginPath();ctx.arc(16,ry+RH/2,4,0,Math.PI*2);ctx.fill();ctx.font=(task.delivery?'600':'400')+' 11px "DM Sans",sans-serif';ctx.fillStyle=task.done?tx2:tx;ctx.textAlign='left';const lbl=(task.delivery?'🚩 ':'')+task.task;const tlbl=trunc(lbl,SB-100);ctx.fillText(tlbl,28,ry+RH/2);if(task.done){ctx.strokeStyle=tx2;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(28,ry+RH/2);ctx.lineTo(28+ctx.measureText(tlbl).width,ry+RH/2);ctx.stroke();}ctx.font='10px "JetBrains Mono",monospace';ctx.fillStyle=tx2;ctx.textAlign='right';ctx.fillText(taskRangeLabel(task),SB-8,ry+RH/2);const off=dayOffset(getTaskStart(task),startDate);const dur=Math.max(1,taskDuration(task));const bx=SB+off*DW,bw=Math.max(4,dur*DW),by=ry+(RH-16)/2;rr(bx,by,bw,16,4);if(task.done){ctx.fillStyle=proj.color+'55';ctx.fill();}else{const g=ctx.createLinearGradient(bx,0,bx+bw,0);g.addColorStop(0,proj.color);g.addColorStop(1,proj.bg);ctx.fillStyle=g;ctx.fill();}if(task.delivery&&!task.done){rr(bx,by,bw,16,4);ctx.strokeStyle='#ef4444';ctx.lineWidth=2;ctx.stroke();}}const ly=TH+MH+filtered.length*RH;ctx.fillStyle=surf;ctx.fillRect(0,ly,W,LH);hl(ly);let lx=18;ctx.textBaseline='middle';for(const [nm,proj] of Object.entries(projects)){if(!filterProjects.has(nm))continue;r function openTaskModal(id){

function renderSubtaskList(disabled){

function addSubtask(){
  const today=fmtDate(new Date());
  editSubtasks.push({id:crypto.randomUUID(),task:'',startDate:today,endDate:today,done:false});
  renderSubtaskList(false);
  const last=document.getElementById(`st-task-${editSubtasks.length-1}`);
  if(last)last.focus();
}
function removeSubtask(idx){editSubtasks.splice(idx,1);renderSubtaskList(false);}
function collectSubtasks(){
  return editSubtasks.map((st,i)=>({
    id:st.id,
    task:(document.getElementById(`st-task-${i}`)?.value||'').trim(),
    startDate:document.getElementById(`st-start-${i}`)?.value||st.startDate,
    endDate:document.getElementById(`st-end-${i}`)?.value||st.endDate,
    done:Boolean(document.getElementById(`st-done-${i}`)?.checked)
  })).filter(st=>st.task);
}

function captureImportFile(event){
  importFile=event.target.files?.[0]||null;
}

async function ensureProjectsForImport(projectNames,replaceExisting){
  const existingNames=replaceExisting?[]:Object.keys(projects);
  const allNames=replaceExisting?[...projectNames]:[...new Set([...existingNames,...projectNames])];
  if(replaceExisting){
    const deleteExistingTasks=await supabase.from('tasks').delete().eq('chart_id',selectedChart.id);
    if(deleteExistingTasks.error)throw deleteExistingTasks.error;
    const deleteExistingProjects=await supabase.from('projects').delete().eq('chart_id',selectedChart.id);
    if(deleteExistingProjects.error)throw deleteExistingProjects.error;
  }
  const projectRows=allNames.map((name,index)=>{
    const existing=projects[name];
    const style=existing?{color:existing.color,bg:existing.bg}:nextImportProjectStyle(index);
    return{chart_id:selectedChart.id,name,color:style.color,bg:style.bg,position:index};
  });
  if(!projectRows.length)return;
  const {error}=await supabase.from('projects').upsert(projectRows,{onConflict:'chart_id,name'});
  if(error)throw error;
}

async function runImport(){
  if(!selectedChart||!selectedCanEdit()||!importFile)return;
  try{
    const text=await importFile.text();
    const importedTasks=parseImportRows(text);
    if(!importedTasks.length)throw new Error('No usable task rows were found in that CSV.');
    const replaceExisting=document.getElementById('import-replace').checked;
    const projectNames=[...new Set(importedTasks.map(task=>task.project))];
    await ensureProjectsForImport(projectNames,replaceExisting);
    const taskRows=importedTasks.map(task=>({
      chart_id:selectedChart.id,
      task:task.task,
      description:task.description,
      outputs:task.outputs,
      project:task.project,
      start_date:getTaskStart(task),
      end_date:getTaskEnd(task),
      delivery:task.delivery,
      done:task.done
    }));
    const {error}=await supabase.from('tasks').insert(taskRows);
    if(error)throw error;
    closeModal();
    flashMessage=`Imported ${importedTasks.length} block${importedTasks.length===1?'':'s'} into "${selectedChart.title}".`;
    await loadSelectedChart();
    render();
  }catch(error){
    flashMessage=error.message||String(error);
    render();
  }
}

  rememberChartView();

function toggleProjectFilter(name){
  if(filterProjects.has(name)){
    filterProjects.delete(name);
    if(!filterProjects.size)filterProjects=new Set(Object.keys(projects));
  }else{
    filterProjects.add(name);
  }
  rememberChartView();
  render();
}

function toggleSelectAllProjects(){
  const allNames=Object.keys(projects);
  if(filterProjects.size===allNames.length){filterProjects=new Set();}
  else{filterProjects=new Set(allNames);}
  rememberChartView();
  render();
}

async function selectChart(id){
  if(selectedChartId===id&&!chartLoading)return;
  selectedChartId=id;
  rememberSelectedChart(id);
  selectedChart=charts.find(chart=>chart.id===id)||null;
  projects={};
  tasks=[];
  shareRows=[];
  showDeliveryOnly=false;
  filterProjects=new Set();
  chartLoading=true;
  render();
  await loadSelectedChart(id);
  chartLoading=false;
  render();
}

let currentPalette='default',currentMascot='panda';
function loadPrefs(){
  try{const p=JSON.parse(localStorage.getItem('ganttPrefs')||'{}');if(p.palette&&PALETTES[p.palette])currentPalette=p.palette;if(p.mascot&&MASCOTS[p.mascot])currentMascot=p.mascot;}catch{}
}
function savePrefs(){localStorage.setItem('ganttPrefs',JSON.stringify({palette:currentPalette,mascot:currentMascot}));}
function applyPalette(id){
  const p=PALETTES[id];if(!p)return;currentPalette=id;
  const r=document.documentElement.style;
  r.setProperty('--bg',p.bg);r.setProperty('--surface',p.surface);r.setProperty('--surface2',p.surface2);
  r.setProperty('--border',p.border);r.setProperty('--text',p.text);r.setProperty('--text2',p.text2);
  r.setProperty('--accent',p.accent);r.setProperty('--accent2',p.accent2);
  savePrefs();
}
function applyMascot(id){
  const m=MASCOTS[id];if(!m)return;currentMascot=id;
  const face=document.getElementById('mascot-face');
  if(face)face.innerHTML=m.svg;
  savePrefs();
}
function openPreferencesModal(){
  const overlay=modalShell();
  const palHtml=Object.entries(PALETTES).map(([id,p])=>`<div class="palette-swatch${id===currentPalette?' active':''}" onclick="applyPalette('${id}');renderPreferencesModal()"><div class="palette-dots"><div class="palette-dot" style="background:${p.bg};border:1px solid ${p.border}"></div><div class="palette-dot" style="background:${p.surface}"></div><div class="palette-dot" style="background:${p.accent2}"></div></div>${p.name}</div>`).join('');
  const masHtml=Object.entries(MASCOTS).map(([id,m])=>`<div class="mascot-opt${id===currentMascot?' active':''}" onclick="applyMascot('${id}');renderPreferencesModal()"><div class="mascot-emoji">${m.emoji}</div>${m.name}</div>`).join('');
  overlay.innerHTML=`<div class="modal"><h3>Preferences</h3><p>Customise your Gantt chart experience.</p><label style="margin-top:16px;display:block;font-weight:600;font-size:12px">Colour palette</label><div class="palette-grid">${palHtml}</div><label style="margin-top:18px;display:block;font-weight:600;font-size:12px">Mascot</label><div class="mascot-grid">${masHtml}</div><div class="modal-buttons"><button class="btn btn-primary" onclick="closeModal()">Done</button></div></div>`;
}
function renderPreferencesModal(){openPreferencesModal();}

(function initMascot(){
  const messages=[
    "The secret of getting ahead is getting started. — Mark Twain",
    "It always seems impossible until it's done. — Nelson Mandela",
    "Don't watch the clock; do what it does. Keep going. — Sam Levenson",
    "You don't have to be great to start, but you have to start to be great. — Zig Ziglar",
    "Hard work beats talent when talent doesn't work hard. — Tim Notke",
    "Believe you can and you're halfway there. — Theodore Roosevelt",
    "Success is the sum of small efforts repeated day in and day out. — Robert Collier",
    "The future depends on what you do today. — Mahatma Gandhi",
    "You are never too old to set another goal or to dream a new dream. — C.S. Lewis",
    "Start where you are. Use what you have. Do what you can. — Arthur Ashe",
    "What you do today can improve all your tomorrows. — Ralph Marston",
    "Little by little, a little becomes a lot. — Tanzanian proverb",
    "Energy and persistence conquer all things. — Benjamin Franklin",
    "Do something today that your future self will thank you for.",
    "Progress, not perfection. 🐾",
    "One step at a time is all it takes to get you there.",
    "Great things are done by a series of small things brought together. — Van Gogh",
    "Push yourself, because no one else is going to do it for you.",
    "Dream it. Wish it. Do it.",
    "The harder you work for something, the greater you'll feel when you achieve it.",
  ];
  let timer=null;
  function todayIso(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
  function todayEu(){const d=new Date();return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`}
  function getDailyIdx(){
    try{
      const stored=JSON.parse(localStorage.getItem('ganttMascotDay')||'{}');
      if(stored.date===todayIso())return stored.idx;
    }catch{}
    const d=new Date();
    const dayOfYear=Math.floor((d-new Date(d.getFullYear(),0,0))/86400000);
    const idx=dayOfYear%messages.length;
    try{localStorage.setItem('ganttMascotDay',JSON.stringify({date:todayIso(),idx}));}catch{}
    return idx;
  }
  function showBubble(){
    const bubble=document.getElementById('mascot-bubble');
    if(!bubble)return;
    const idx=getDailyIdx();
    bubble.innerHTML=`<span style="display:block;font-size:10px;font-weight:600;color:var(--text2);margin-bottom:4px">${todayEu()}</span>${esc(messages[idx])}`;
    bubble.classList.add('show');
    clearTimeout(timer);
    timer=setTimeout(()=>bubble.classList.remove('show'),6000);
  }
  window.mascotSpeak=showBubble;
  loadPrefs();
  applyPalette(currentPalette);
  applyMascot(currentMascot);
  setTimeout(showBubble,2000);
})();

init();
</script>
